name: Publish TypeScript SDK to NPM

on:
  push:
    tags:
      - 'ts/v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Validate tag version matches package.json
        run: |
          TAG="${GITHUB_REF#refs/tags/}"         # ts/v0.1.9
          TAG_VERSION="${TAG#ts/v}"              # 0.1.9
          PKG_VERSION=$(node -p "require('./typescript/package.json').version")
          echo "Tag version   : $TAG_VERSION"
          echo "Package version: $PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "ERROR: Tag version ($TAG_VERSION) does not match typescript/package.json ($PKG_VERSION)"
            echo "Run ./scripts/release.sh $TAG_VERSION to keep them in sync."
            exit 1
          fi

      - name: Install dependencies
        working-directory: typescript
        run: npm install

      - name: Build SDK
        working-directory: typescript
        run: npm run build

      - name: Publish to NPM
        working-directory: typescript
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
