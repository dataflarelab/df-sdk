name: Publish Python SDK to PyPI

on:
  push:
    tags:
      - 'py/v*'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/dataflare-sdk

    permissions:
      id-token: write # IMPORTANT: mandatory for trusted publishing
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history needed so hatch-vcs can resolve the version from tags
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        working-directory: ./python
        run: |
          python -m pip install --upgrade pip
          pip install build hatch-vcs hatchling

      - name: Validate tag version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"         # py/v0.1.9
          VERSION="${TAG#py/v}"                  # 0.1.9
          echo "Releasing Python SDK version: $VERSION"
          # hatch-vcs resolves version from tag at build time; just log for traceability
          echo "TAG=$VERSION" >> "$GITHUB_ENV"

      - name: Build package
        working-directory: ./python
        run: python -m build

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: python/dist/
