name: MCP Server Tests
on:
  push:
    paths: ["mcp/**"]
  pull_request:
    paths: ["mcp/**"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            typescript/package-lock.json
            mcp/package-lock.json
      - name: Install & Build TypeScript SDK
        working-directory: typescript
        run: |
          npm install
          npm run build
          npm link
      - name: Install & Build MCP Server
        working-directory: mcp
        run: |
          npm install
          npm link dataflare-sdk
          npm run typecheck
          npm run build
          npm test
